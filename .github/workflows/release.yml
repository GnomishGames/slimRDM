name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            pkg-config \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: SlimRDM ${{ github.ref_name }}
          releaseBody: |
            ## What's New

            - **Alphabetical connection sorting** — connections are now sorted alphabetically by label instead of by creation date
            - **Monokai Light theme** — added a third light theme option alongside GitHub Light and Solarized Light
            - **About page update** — now credits both Claude and MiniMax for AI assistance

            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Linux | `.deb` | Debian / Ubuntu |
            | Linux | `.AppImage` | Universal (any distro) |
            | macOS | `.dmg` | Universal — Intel + Apple Silicon |
            | Windows | `.msi` | Windows installer |
            | Windows | `.exe` | NSIS installer |

            > **macOS**: builds are unsigned. Right-click → Open on first launch to bypass Gatekeeper.
            > **Windows**: SmartScreen may warn on first run — click "More info → Run anyway".
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
