name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: '--bundles deb,appimage'
          - platform: macos-latest
            args: '--target universal-apple-darwin --bundles dmg'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            pkg-config \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust MSVC target for Windows
        if: matrix.platform == 'windows-latest'
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install Windows build tools
        if: matrix.platform == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          version: '25.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Visual Studio Build Tools
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build release notes
        id: changelog
        shell: bash
        run: |
          # Extract just this version's notes (between the first two "## [" headers)
          awk '/^## \[/{count++; if(count==2) exit} count==1 && !/^## \[/{print}' CHANGELOG.md \
            | grep -v '^---$' \
            | sed -e 's/[[:space:]]*$//' \
            | awk 'NF || prev_nf { print } { prev_nf = NF }' > changelog.txt
          # Splice version + changelog into the release-body template
          {
            echo "body<<CHANGELOG_EOF"
            awk -v v="$GITHUB_REF_NAME" '
              /^__CHANGELOG__$/ { while ((getline line < "changelog.txt") > 0) print line; next }
              { gsub(/__VERSION__/, v); print }
            ' .github/release-body.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: SlimRDM ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
